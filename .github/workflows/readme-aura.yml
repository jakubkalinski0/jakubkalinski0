name: Generate README

on:
  push:
    branches: [main, master]
    paths:
      - readme.source.md
      - scripts/inject-profile-line-stats.mjs
      - scripts/ensure-readme-font.mjs
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure NotoSans (Latin Extended / Polish in SVG)
        run: node scripts/ensure-readme-font.mjs

      - name: Inject profile GitHub stats
        env:
          PROFILE_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT improves private owned repo coverage and contribution-graph parity.
          PROFILE_LINE_STATS_TOKEN: ${{ secrets.PROFILE_LINE_STATS_TOKEN }}
        run: node scripts/inject-profile-line-stats.mjs

      - name: Generate README from readme-aura
        uses: collectioneur/readme-aura@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source: readme.source.build.md
          fonts_dir: .github/fonts
